<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon Composer v3.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1e1e2e;--panel:#262637;--border:#3a3a52;--txt:#e0e0ef;--txt2:#9999b3;--acc:#4aaed9;--acc2:#5ac8fa;--sel:#2a6cb5;--hover:#32324a;--canvas-bg:#2d2d44;--red:#e05555;--grn:#5aad70}
html,body{height:100%;overflow:hidden;font:13px/1.4 system-ui,-apple-system,sans-serif;color:var(--txt);background:var(--bg)}
.app{display:flex;height:100vh}
.lpanel{width:264px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--panel);flex-shrink:0}
.center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;min-width:0}
.rpanel{width:248px;border-left:1px solid var(--border);display:flex;flex-direction:column;background:var(--panel);flex-shrink:0;overflow-y:auto}
/* Left Panel */
.search-box{padding:10px;border-bottom:1px solid var(--border)}
.search-box input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:#1a1a2e;color:var(--txt);font-size:12px;outline:none}
.search-box input:focus{border-color:var(--acc)}
.drop-zone{margin:8px 10px;padding:14px;border:2px dashed var(--border);border-radius:8px;text-align:center;font-size:11px;color:var(--txt2);cursor:pointer;transition:border-color .2s,background .2s}
.drop-zone:hover,.drop-zone.over{border-color:var(--acc);background:rgba(74,174,217,.08)}
.drop-zone input{display:none}
.cat-tabs{display:flex;flex-wrap:wrap;gap:4px;padding:8px 10px;border-bottom:1px solid var(--border)}
.cat-tab{padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer;color:var(--txt2);background:transparent;border:none;transition:all .15s}
.cat-tab:hover{background:var(--hover);color:var(--txt)}
.cat-tab.active{background:var(--acc);color:#fff}
.icon-grid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:8px 10px;align-content:start}
.icon-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;transition:background .15s}
.icon-cell:hover{background:var(--hover)}
.icon-cell svg{width:22px;height:22px;stroke:var(--txt2);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.icon-cell:hover svg{stroke:var(--txt)}
.add-btns{padding:8px 10px;border-top:1px solid var(--border);display:flex;gap:6px}
.add-btns button{flex:1;padding:6px;border:1px solid var(--border);border-radius:6px;background:var(--hover);color:var(--txt);font-size:11px;cursor:pointer;transition:all .15s}
.add-btns button:hover{background:var(--acc);border-color:var(--acc);color:#fff}
/* Center */
.canvas-wrap{position:relative;width:380px;height:380px;border-radius:4px;flex-shrink:0}
.checker{position:absolute;inset:0;border-radius:4px;background-image:linear-gradient(45deg,#222 25%,transparent 25%),linear-gradient(-45deg,#222 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#222 75%),linear-gradient(-45deg,transparent 75%,#222 75%);background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0px;pointer-events:none;z-index:0}
.canvas-container{position:absolute;inset:0;border-radius:4px;overflow:visible;z-index:1}
.folder-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;pointer-events:none;z-index:1}
.folder-tint{position:absolute;inset:0;mix-blend-mode:color;pointer-events:none;z-index:2;border-radius:4px;-webkit-mask-size:contain;-webkit-mask-repeat:no-repeat;-webkit-mask-position:center;mask-size:contain;mask-repeat:no-repeat;mask-position:center}
.canvas-items{position:absolute;inset:0;z-index:3}
.c-item{position:absolute;cursor:move;user-select:none}
.c-item img{width:100%;height:100%;pointer-events:none}
.c-item.selected{outline:2px solid var(--acc);outline-offset:1px;border-radius:2px}
.c-item.multi-sel{outline:2px dashed var(--acc);outline-offset:1px;border-radius:2px}
.resize-handle{position:absolute;bottom:-5px;right:-5px;width:12px;height:12px;background:var(--acc);border:2px solid #fff;border-radius:50%;cursor:nwse-resize;z-index:10}
.box-select{position:absolute;border:1px dashed var(--acc2);background:rgba(90,200,250,.08);pointer-events:none;z-index:100}
/* Export row */
.export-row{display:flex;gap:6px;margin-top:12px;align-items:center}
.exp-btn{padding:5px 12px;border:1px solid var(--border);border-radius:6px;background:var(--hover);color:var(--txt);font-size:12px;cursor:pointer;transition:all .15s}
.exp-btn:hover,.exp-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
.exp-btn.active{font-weight:600}
.export-go{padding:5px 16px;border:none;border-radius:6px;background:var(--acc);color:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.export-go:hover{background:var(--acc2)}
.batch-btn{padding:5px 12px;border:1px solid var(--acc);border-radius:6px;background:transparent;color:var(--acc);font-size:11px;cursor:pointer;transition:all .15s}
.batch-btn:hover{background:var(--acc);color:#fff}
.hint{margin-top:10px;font-size:11px;color:var(--txt2);text-align:center;max-width:340px}
/* Right Panel */
.rp-section{padding:10px 12px;border-bottom:1px solid var(--border)}
.rp-section:last-child{border-bottom:none}
.rp-title{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.shape-row{display:flex;gap:6px}
.shape-btn{flex:1;padding:5px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--txt2);font-size:11px;cursor:pointer;text-align:center;transition:all .15s}
.shape-btn:hover{border-color:var(--txt2)}
.shape-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
.color-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.color-swatch{width:28px;height:28px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.color-swatch:hover{border-color:var(--txt2)}
.color-swatch.active{border-color:#fff}
.prop-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.prop-label{width:50px;font-size:11px;color:var(--txt2);flex-shrink:0}
.prop-input{flex:1;padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:#1a1a2e;color:var(--txt);font-size:12px;outline:none}
.prop-input:focus{border-color:var(--acc)}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--border);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--acc);cursor:pointer}
.toggle-row{display:flex;align-items:center;justify-content:space-between}
.toggle{position:relative;width:36px;height:20px;cursor:pointer}
.toggle input{display:none}
.toggle-track{position:absolute;inset:0;background:var(--border);border-radius:10px;transition:background .2s}
.toggle input:checked+.toggle-track{background:var(--acc)}
.toggle-knob{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle input:checked~.toggle-knob{transform:translateX(16px)}
.z-btns{display:flex;gap:4px}
.z-btn{padding:2px 8px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--txt2);font-size:10px;cursor:pointer}
.z-btn:hover{background:var(--hover);color:var(--txt)}
.shortcuts{font-size:11px;color:var(--txt2);line-height:1.8}
.shortcuts kbd{display:inline-block;padding:1px 5px;border:1px solid var(--border);border-radius:3px;background:var(--hover);font-size:10px;font-family:ui-monospace,monospace}
.emoji-picker{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;max-height:200px;overflow-y:auto}
.emoji-opt{padding:4px;text-align:center;font-size:18px;cursor:pointer;border-radius:4px;border:none;background:transparent}
.emoji-opt:hover{background:var(--hover)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.pin-btn{padding:4px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--txt2);font-size:10px;cursor:pointer;text-align:center}
.pin-btn:hover{border-color:var(--txt2)}
.pin-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
.font-select{width:100%;padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:#1a1a2e;color:var(--txt);font-size:12px;outline:none}
.banner{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:8px 20px;border-radius:8px;background:var(--acc);color:#fff;font-size:12px;font-weight:500;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.banner.show{opacity:1}
.session-row{display:flex;gap:4px;margin-bottom:6px}
.session-btn{flex:1;padding:4px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--txt2);font-size:10px;cursor:pointer;text-align:center}
.session-btn:hover{background:var(--hover);color:var(--txt)}
/* Squircle clip */
.squircle-clip{clip-path:url(#squircle-clip)}
.circle-clip{clip-path:circle(50%)}
/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--txt2)}
</style>
</head>
<body>
<svg style="position:absolute;width:0;height:0">
<defs><clipPath id="squircle-clip" clipPathUnits="objectBoundingBox">
<path d="M 0.5 0 C 0.83 0 1 0.17 1 0.5 C 1 0.83 0.83 1 0.5 1 C 0.17 1 0 0.83 0 0.5 C 0 0.17 0.17 0 0.5 0 Z"/>
</clipPath></defs>
</svg>
<div class="app">
<div class="lpanel">
<div class="search-box"><input type="text" id="searchInput" placeholder="Search icons..."></div>
<div class="drop-zone" id="dropZone">
<span>Drop SVG/PNG here or click to import</span>
<input type="file" id="fileInput" accept=".svg,.png,.jpg,.jpeg,.gif,.webp" multiple>
</div>
<div class="cat-tabs" id="catTabs"></div>
<div class="icon-grid" id="iconGrid"></div>
<div class="add-btns">
<button onclick="addTextItem()">+ Text</button>
<button onclick="showEmojiPicker()">+ Emoji</button>
</div>
</div>
<div class="center">
<div class="canvas-wrap" id="canvasWrap">
<div class="checker"></div>
<div class="canvas-container" id="canvasContainer">
<div class="canvas-items" id="canvasItems"></div>
</div>
</div>
<div class="export-row">
<button class="exp-btn" data-sz="128">128</button>
<button class="exp-btn active" data-sz="256">256</button>
<button class="exp-btn" data-sz="512">512</button>
<button class="exp-btn" data-sz="1024">1024</button>
<button class="export-go" onclick="doExport()">Export PNG</button>
<button class="batch-btn" onclick="doBatchExport()">All Sizes</button>
</div>
<div class="hint">Click an icon to place it on the canvas. Drag to move, handle to resize. Del to remove.</div>
</div>
<div class="rpanel" id="rightPanel"></div>
</div>
<div class="banner" id="banner"></div>

// Helpers
function showBanner(msg){
  const b=document.getElementById('banner');
  b.textContent=msg;b.classList.add('show');
  clearTimeout(bannerTimeout);
  bannerTimeout=setTimeout(()=>b.classList.remove('show'),2000);
}

function pushUndo(){
  const snap=JSON.parse(JSON.stringify(state.items,function(k,v){
    if(k==='customSrc')return undefined;return v;
  }));
  state.undoStack.push(snap);
  if(state.undoStack.length>30)state.undoStack.shift();
  state.redoStack=[];
}

function doUndo(){
  if(!state.undoStack.length)return;
  const snap=JSON.parse(JSON.stringify(state.items,function(k,v){
    if(k==='customSrc')return undefined;return v;
  }));
  state.redoStack.push(snap);
  const prev=state.undoStack.pop();
  state.items=prev.map(function(it){
    if(it.type==='custom'&&imageCache[it.id])it.customSrc=imageCache[it.id];
    return it;
  });
  state.selIds=[];
  renderCanvasItems();renderRightPanel();
}

function doRedo(){
  if(!state.redoStack.length)return;
  const snap=JSON.parse(JSON.stringify(state.items,function(k,v){
    if(k==='customSrc')return undefined;return v;
  }));
  state.undoStack.push(snap);
  const next=state.redoStack.pop();
  state.items=next.map(function(it){
    if(it.type==='custom'&&imageCache[it.id])it.customSrc=imageCache[it.id];
    return it;
  });
  state.selIds=[];
  renderCanvasItems();renderRightPanel();
}

function makeSvgDataUrl(inner,color,sz){
  var s='<svg xmlns="http://www.w3.org/2000/svg" width="'+sz+'" height="'+sz+'" viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+inner+'</svg>';
  return 'data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(s)));
}

function makeTextSvgDataUrl(text,fontFamily,color,w,h){
  var escaped=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  var len=text.length||1;
  var sz=Math.min(w*0.85/Math.max(len*0.55,1),h*0.85);
  var s='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
    +'<text x="50%" y="50%" text-anchor="middle" dominant-baseline="central"'
    +' font-family="'+fontFamily+',-apple-system,sans-serif" font-size="'+sz+'"'
    +' font-weight="700" fill="'+color+'">'+escaped+'</text></svg>';
  return 'data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(s)));
}

function loadImg(src){
  return new Promise(function(resolve){
    if(!src){resolve(null);return;}
    var img=new Image();
    img.onload=function(){resolve(img);};
    img.onerror=function(){resolve(null);};
    img.src=src;
  });
}

function getSelItems(){return state.items.filter(function(it){return state.selIds.indexOf(it.id)!==-1;});}
function getSelItem(){return state.items.find(function(it){return state.selIds.length===1&&it.id===state.selIds[0];});}

// roundRect polyfill
function drawRoundRect(ctx,x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);return;}
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawSquircle(ctx,x,y,w,h){
  var cx=x+w/2,cy=y+h/2,hw=w/2,hh=h/2,k=0.55;
  ctx.beginPath();
  ctx.moveTo(cx,y);
  ctx.bezierCurveTo(cx+hw*k,y,x+w,cy-hh*k,x+w,cy);
  ctx.bezierCurveTo(x+w,cy+hh*k,cx+hw*k,y+h,cx,y+h);
  ctx.bezierCurveTo(cx-hw*k,y+h,x,cy+hh*k,x,cy);
  ctx.bezierCurveTo(x,cy-hh*k,cx-hw*k,y,cx,y);
  ctx.closePath();
}

function renderCanvasItems(){
  var el=document.getElementById('canvasItems');
  var sorted=state.items.slice().sort(function(a,b){return(a.z||0)-(b.z||0);});
  var isFolder=isImageShape();
  var html='';
  for(var i=0;i<sorted.length;i++){
    var it=sorted[i];
    var isSel=state.selIds.indexOf(it.id)!==-1;
    var isMulti=state.selIds.length>1&&isSel;
    var baseCol=it.cc?it.col:(isFolder?'#ffffff':'#333333');

    if(it.type==='emoji'){
      var emojiHtml='<div data-item-id="'+it.id+'" class="c-item'+(isSel?' selected':'')+(isMulti?' multi-sel':'')+'" style="'
        +'position:absolute;left:'+it.x+'%;top:'+it.y+'%;width:'+it.sz+'%;height:'+it.sz+'%;'
        +'opacity:'+(it.op/100)+';transform:rotate('+it.rot+'deg);'
        +'display:flex;align-items:center;justify-content:center;font-size:'+it.sz*3.2+'px;'
        +'user-select:none;cursor:move;z-index:'+(10+i)+'">'
        +it.text;
      if(isSel)emojiHtml+='<div class="resize-handle" data-resize-id="'+it.id+'"></div>';
      emojiHtml+='</div>';
      html+=emojiHtml;
      continue;
    }

    // Build emboss layers for preview if active (lucide, text, custom — not emoji)
    if(isFolder&&it.emboss&&it.type!=='emoji'){
      var embBase=it.cc?it.col:state.embossColor;
      var darkCol=darkenColor(embBase,0.3);
      var midCol=embBase;
      var pos='left:'+it.x+'%;top:'+it.y+'%;width:'+it.sz+'%;height:'+it.sz+'%;';
      var rot='transform:rotate('+it.rot+'deg);';
      var zBase=10+i;
      // Text needs tighter offsets — thin letterforms blur with large shifts
      var isText=it.type==='text';
      var shOff=isText?'-0.6%,-0.6%':'-1.5%,-1.5%';
      var hlOff=isText?'0.7%,0.7%':'1.8%,1.8%';
      var shOp=isText?0.5:0.6;
      var hlOp=isText?0.2:0.25;
      var fillOp=isText?0.55:0.45;

      // Shadow layer (dark, offset up-left)
      var shadowSrc='';
      if(it.type==='lucide') shadowSrc=makeSvgDataUrl(ICONS[it.icon],darkCol,200);
      else if(it.type==='text') shadowSrc=makeTextSvgDataUrl(it.text||'Aa',it.fontFamily||'system-ui',darkCol,200,200);
      else if(it.type==='custom') shadowSrc=it.customSrc;
      if(shadowSrc){
        html+='<div class="c-item" style="'+pos+'opacity:'+(it.op/100*shOp)+';'+rot
          +'z-index:'+zBase+';pointer-events:none;transform:rotate('+it.rot+'deg) translate('+shOff+')">'
          +'<img src="'+shadowSrc+'" draggable="false"'
          +(it.type==='custom'?' style="filter:brightness(0.3) sepia(1) hue-rotate('+getHueRotate(darkCol)+'deg) saturate(3)"':'')
          +'></div>';
      }

      // Highlight layer (white, offset down-right)
      var hlSrc='';
      if(it.type==='lucide') hlSrc=makeSvgDataUrl(ICONS[it.icon],'#ffffff',200);
      else if(it.type==='text') hlSrc=makeTextSvgDataUrl(it.text||'Aa',it.fontFamily||'system-ui','#ffffff',200,200);
      else if(it.type==='custom') hlSrc=it.customSrc;
      if(hlSrc){
        html+='<div class="c-item" style="'+pos+'opacity:'+(it.op/100*hlOp)+';'
          +'z-index:'+(zBase+1)+';pointer-events:none;transform:rotate('+it.rot+'deg) translate('+hlOff+')">'
          +'<img src="'+hlSrc+'" draggable="false"'
          +(it.type==='custom'?' style="filter:brightness(10) saturate(0)"':'')
          +'></div>';
      }

      // Fill layer (emboss color, no offset)
      var fillSrc='';
      if(it.type==='lucide') fillSrc=makeSvgDataUrl(ICONS[it.icon],midCol,200);
      else if(it.type==='text') fillSrc=makeTextSvgDataUrl(it.text||'Aa',it.fontFamily||'system-ui',midCol,200,200);
      else if(it.type==='custom') fillSrc=it.customSrc;
      if(fillSrc){
        html+='<div data-item-id="'+it.id+'" class="c-item'+(isSel?' selected':'')+(isMulti?' multi-sel':'')+'" style="'+pos
          +'opacity:'+(it.op/100*fillOp)+';'+rot+'z-index:'+(zBase+2)+'">'
          +'<img src="'+fillSrc+'" draggable="false"'
          +(it.type==='custom'?' style="filter:sepia(1) hue-rotate('+getHueRotate(midCol)+'deg) saturate(2) brightness(0.8)"':'')
          +'>';
        if(isSel)html+='<div class="resize-handle" data-resize-id="'+it.id+'"></div>';
        html+='</div>';
      }
    }else{
      // Non-emboss: single flat image
      var src='';
      if(it.type==='lucide') src=makeSvgDataUrl(ICONS[it.icon],baseCol,200);
      else if(it.type==='custom') src=it.customSrc;
      else if(it.type==='text') src=makeTextSvgDataUrl(it.text||'Aa',it.fontFamily||'system-ui',baseCol,200,200);
      html+='<div data-item-id="'+it.id+'" class="c-item'+(isSel?' selected':'')+(isMulti?' multi-sel':'')+'" style="'
        +'left:'+it.x+'%;top:'+it.y+'%;width:'+it.sz+'%;height:'+it.sz+'%;'
        +'opacity:'+(it.op/100)+';transform:rotate('+it.rot+'deg);z-index:'+(10+i)+'">'
        +'<img src="'+src+'" draggable="false">';
      if(isSel)html+='<div class="resize-handle" data-resize-id="'+it.id+'"></div>';
      html+='</div>';
    }
  }
  el.innerHTML=html;
}

// Approximate hue rotation for CSS filter tinting of custom images
function getHueRotate(hex){
  var r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  var max=Math.max(r,g,b),min=Math.min(r,g,b),h=0;
  if(max!==min){
    var d=max-min;
    if(max===r)h=((g-b)/d+(g<b?6:0))/6;
    else if(max===g)h=((b-r)/d+2)/6;
    else h=((r-g)/d+4)/6;
  }
  return Math.round(h*360-50);
}

  var it={id:state.nid++,type:'emoji',text:em,x:0,y:0,sz:18,col:'',cc:false,op:100,rot:0,z:state.items.length+100,pinned:true,pinPos:'br',emboss:false};
  applyEmojiPin(it);
  state.items.push(it);
  state.selIds=[it.id];
  renderCanvasItems();renderRightPanel();
}

function applyEmojiPin(it){
  var positions={tl:{x:2,y:2},tc:{x:38,y:2},tr:{x:70,y:2},bl:{x:2,y:70},bc:{x:38,y:70},br:{x:70,y:62}};
  var p=positions[it.pinPos]||positions.br;
  it.x=p.x;it.y=p.y;
}

function setEmojiPin(pos){
  var sel=getSelItem();
  if(!sel||sel.type!=='emoji')return;
  pushUndo();
  sel.pinPos=pos;
  applyEmojiPin(sel);
  renderCanvasItems();renderRightPanel();
}

function updateSelProp(k,v){
  var sel=getSelItem();
  if(!sel)return;
  sel[k]=v;
  renderCanvasItems();
  if(k==='fontFamily'||k==='cc'||k==='col')renderRightPanel();
}

function moveZ(dir){
  var sel=getSelItem();
  if(!sel)return;
  pushUndo();
  sel.z=(sel.z||0)+dir*2;
  renderCanvasItems();
}

function deleteSelected(){
  if(!state.selIds.length)return;
  pushUndo();
  state.items=state.items.filter(function(it){return state.selIds.indexOf(it.id)===-1;});
  state.selIds=[];
  renderCanvasItems();renderRightPanel();
}

function duplicateSelected(){
  var sel=getSelItem();
  if(!sel)return;
  pushUndo();
  var dup=JSON.parse(JSON.stringify(sel));
  dup.id=state.nid++;dup.x+=5;dup.y+=5;dup.z=(dup.z||0)+1;
  if(dup.type==='custom'&&imageCache[sel.id]){
    dup.customSrc=imageCache[sel.id];
    imageCache[dup.id]=dup.customSrc;
  }
  state.items.push(dup);
  state.selIds=[dup.id];
  renderCanvasItems();renderRightPanel();
}

function clearCanvas(){
  pushUndo();
  state.items=[];state.selIds=[];
  renderCanvasItems();renderRightPanel();
  showBanner('Canvas cleared');
}

// File Import
function handleFiles(files){
  for(var i=0;i<files.length;i++){
    (function(file){
      var reader=new FileReader();
      reader.onload=function(e){
        var src=e.target.result;
        var name=file.name.replace(/\.[^.]+$/,'');
        if(file.type==='image/svg+xml'){
          // Convert SVG text to data URL
          var svgText=atob(src.split(',')[1]||'');
          if(src.indexOf('base64')===-1){
            svgText=decodeURIComponent(src.split(',')[1]||'');
          }
          src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svgText)));
        }
        state.customIcons.push({id:state.customNid++,name:name,src:src});
        renderIconGrid();
        showBanner('Imported: '+name);
      };
      reader.readAsDataURL(file);
    })(files[i]);
  }
}

// Canvas interaction (event delegation)
var canvasItems=document.getElementById('canvasItems');
var canvasWrap=document.getElementById('canvasWrap');

canvasWrap.addEventListener('mousedown',function(e){
  var target=e.target;
  // Walk up to find data attributes
  var itemId=null,resizeId=null;
  var el=target;
  while(el&&el!==canvasWrap){
    if(el.dataset&&el.dataset.resizeId){resizeId=+el.dataset.resizeId;break;}
    if(el.dataset&&el.dataset.itemId){itemId=+el.dataset.itemId;break;}
    el=el.parentElement;
  }
  
  if(resizeId!==null){
    // Start resize
    isResizing=true;
    var item=state.items.find(function(it){return it.id===resizeId;});
    if(!item)return;
    state.selIds=[resizeId];
    dragStart={mx:e.clientX,my:e.clientY,sz:item.sz};
    e.preventDefault();
    return;
  }
  
  if(itemId!==null){
    var item2=state.items.find(function(it){return it.id===itemId;});
    if(!item2)return;
    if(e.shiftKey){
      // Toggle multi-select
      var idx=state.selIds.indexOf(itemId);
      if(idx===-1)state.selIds.push(itemId);
      else state.selIds.splice(idx,1);
      renderCanvasItems();renderRightPanel();
    }else{
      if(state.selIds.indexOf(itemId)===-1)state.selIds=[itemId];
    }
    isDragging=true;
    var rect=canvasWrap.getBoundingClientRect();
    dragStart={mx:e.clientX,my:e.clientY};
    dragItemOffsets=getSelItems().map(function(it){return{id:it.id,x:it.x,y:it.y};});
    renderCanvasItems();renderRightPanel();
    e.preventDefault();
    return;
  }
  
  // Background click - start box select or deselect
  isBoxSelecting=true;
  var rect2=canvasWrap.getBoundingClientRect();
  boxStart={x:e.clientX-rect2.left,y:e.clientY-rect2.top,cx:e.clientX,cy:e.clientY};
  e.preventDefault();
});

document.addEventListener('mousemove',function(e){
  if(isDragging){
    var rect=canvasWrap.getBoundingClientRect();
    var dx=(e.clientX-dragStart.mx)/rect.width*100;
    var dy=(e.clientY-dragStart.my)/rect.height*100;
    dragItemOffsets.forEach(function(off){
      var item=state.items.find(function(it){return it.id===off.id;});
      if(item){item.x=off.x+dx;item.y=off.y+dy;}
    });
    renderCanvasItems();
  }else if(isResizing){
    var dx2=(e.clientX-dragStart.mx);
    var dy2=(e.clientY-dragStart.my);
    var delta=Math.max(dx2,dy2);
    var rect2=canvasWrap.getBoundingClientRect();
    var newSz=dragStart.sz+delta/rect2.width*100;
    newSz=Math.max(4,Math.min(90,newSz));
    var sel=getSelItem();
    if(sel)sel.sz=newSz;
    renderCanvasItems();
  }else if(isBoxSelecting){
    var rect3=canvasWrap.getBoundingClientRect();
    var cx=e.clientX-rect3.left,cy=e.clientY-rect3.top;
    var dx3=Math.abs(cx-boxStart.x),dy3=Math.abs(cy-boxStart.y);
    if(dx3>5||dy3>5){
      if(!boxEl){
        boxEl=document.createElement('div');
        boxEl.className='box-select';
        canvasWrap.appendChild(boxEl);
      }
      var x1=Math.min(boxStart.x,cx),y1=Math.min(boxStart.y,cy);
      boxEl.style.left=x1+'px';boxEl.style.top=y1+'px';
      boxEl.style.width=dx3+'px';boxEl.style.height=dy3+'px';
    }
  }
});

document.addEventListener('mouseup',function(e){
  if(isDragging){
    isDragging=false;
    pushUndo();
    renderRightPanel();
  }else if(isResizing){
    isResizing=false;
    pushUndo();
    renderRightPanel();
  }else if(isBoxSelecting){
    isBoxSelecting=false;
    if(boxEl){
      // Calculate which items are inside box
      var rect=canvasWrap.getBoundingClientRect();
      var bx1=parseFloat(boxEl.style.left)/rect.width*100;
      var by1=parseFloat(boxEl.style.top)/rect.height*100;
      var bx2=bx1+parseFloat(boxEl.style.width)/rect.width*100;
      var by2=by1+parseFloat(boxEl.style.height)/rect.height*100;
      state.selIds=[];
      state.items.forEach(function(it){
        var cx=it.x+it.sz/2,cy=it.y+it.sz/2;
        if(cx>=bx1&&cx<=bx2&&cy>=by1&&cy<=by2)state.selIds.push(it.id);
      });
      boxEl.remove();boxEl=null;
      renderCanvasItems();renderRightPanel();
    }else{
      // Simple click on background = deselect
      state.selIds=[];
      renderCanvasItems();renderRightPanel();
    }
  }
});

// Keyboard shortcuts
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  
  var cmd=e.metaKey||e.ctrlKey;
  
  if((e.key==='Delete'||e.key==='Backspace')&&state.selIds.length){
    e.preventDefault();deleteSelected();return;
  }
  if(cmd&&e.key==='d'){e.preventDefault();duplicateSelected();return;}
  if(cmd&&e.key==='z'&&!e.shiftKey){e.preventDefault();doUndo();return;}
  if(cmd&&e.key==='z'&&e.shiftKey){e.preventDefault();doRedo();return;}
  if(cmd&&e.key==='y'){e.preventDefault();doRedo();return;}
  
  var nudge=e.shiftKey?10:1;
  if(e.key==='ArrowUp'&&state.selIds.length){e.preventDefault();pushUndo();getSelItems().forEach(function(it){it.y-=nudge;});renderCanvasItems();return;}
  if(e.key==='ArrowDown'&&state.selIds.length){e.preventDefault();pushUndo();getSelItems().forEach(function(it){it.y+=nudge;});renderCanvasItems();return;}
  if(e.key==='ArrowLeft'&&state.selIds.length){e.preventDefault();pushUndo();getSelItems().forEach(function(it){it.x-=nudge;});renderCanvasItems();return;}
  if(e.key==='ArrowRight'&&state.selIds.length){e.preventDefault();pushUndo();getSelItems().forEach(function(it){it.x+=nudge;});renderCanvasItems();return;}
});

// Sessions (localStorage)
function saveSession(){
  try{
    var name=prompt('Session name:','My Icon');
    if(!name)return;
    var data={name:name,date:new Date().toISOString(),shape:state.shape,bgMode:state.bgMode,
      grad:state.grad,solid:state.solid,
      embossColor:state.embossColor,folderColor:state.folderColor,
      items:state.items.map(function(it){
        var clone=Object.assign({},it);
        if(clone.type==='custom')clone.customSrc='[REQUIRES_REIMPORT]';
        return clone;
      })
    };
    var sessions=[];
    try{sessions=JSON.parse(localStorage.getItem('iconComposerSessions')||'[]');}catch(e){}
    sessions.push(data);
    localStorage.setItem('iconComposerSessions',JSON.stringify(sessions));
    showBanner('Session saved: '+name);
  }catch(e){showBanner('Save failed (private browsing?)');}
}

function loadSessionPicker(){
  var sessions=[];
  try{sessions=JSON.parse(localStorage.getItem('iconComposerSessions')||'[]');}catch(e){}
  if(!sessions.length){showBanner('No saved sessions');return;}
  var names=sessions.map(function(s,i){return(i+1)+'. '+s.name;}).join('\n');
  var choice=prompt('Pick session:\n'+names);
  if(!choice)return;
  var idx=parseInt(choice)-1;
  if(idx<0||idx>=sessions.length)return;
  var data=sessions[idx];
  pushUndo();
  state.shape=data.shape;state.bgMode=data.bgMode;state.grad=data.grad;state.solid=data.solid;
  state.embossColor=data.embossColor;state.folderColor=data.folderColor;
  state.items=data.items;state.selIds=[];
  renderCanvasBg();renderCanvasItems();renderRightPanel();
  showBanner('Loaded: '+data.name);
}

// EXPORT PIPELINE
async function doExport(){
  try{
    var sz=state.expSz;
    var isP3=window.matchMedia&&matchMedia('(color-gamut: p3)').matches;
    var canvas=document.createElement('canvas');
    canvas.width=sz;canvas.height=sz;
    var ctx=canvas.getContext('2d',isP3?{colorSpace:'display-p3'}:{});
    if(!ctx)throw new Error('Canvas context failed');
    
    if(isImageShape()){
      // Draw shape image with tint
      var shapeImg=await loadImg(getShapeImage());
      if(shapeImg){
        ctx.drawImage(shapeImg,0,0,sz,sz);
        ctx.globalCompositeOperation='color';
        ctx.fillStyle=state.folderColor;
        ctx.fillRect(0,0,sz,sz);
        ctx.globalCompositeOperation='destination-in';
        ctx.drawImage(shapeImg,0,0,sz,sz);
        ctx.globalCompositeOperation='source-over';
      }
    }else{
      // Shape background
      ctx.save();
      if(state.shape==='squircle'){
        drawSquircle(ctx,0,0,sz,sz);ctx.clip();
      }else if(state.shape==='circle'){
        ctx.beginPath();ctx.arc(sz/2,sz/2,sz/2,0,Math.PI*2);ctx.clip();
      }
      if(state.bgMode==='gradient'){
        var angle=state.grad.angle*Math.PI/180;
        var x1=sz/2-Math.cos(angle)*sz/2,y1=sz/2-Math.sin(angle)*sz/2;
        var x2=sz/2+Math.cos(angle)*sz/2,y2=sz/2+Math.sin(angle)*sz/2;
        var grad=ctx.createLinearGradient(x1,y1,x2,y2);
        grad.addColorStop(0,state.grad.c1);grad.addColorStop(1,state.grad.c2);
        ctx.fillStyle=grad;
      }else{
        ctx.fillStyle=state.solid;
      }
      ctx.fillRect(0,0,sz,sz);
      ctx.restore();
    }
    
    // Draw items sorted by z
    var sorted=state.items.slice().sort(function(a,b){return(a.z||0)-(b.z||0);});
    
    for(var i=0;i<sorted.length;i++){
      var it=sorted[i];
      var ix=it.x/100*sz,iy=it.y/100*sz,isz=it.sz/100*sz;
      
      ctx.save();
      ctx.globalAlpha=it.op/100;
      
      if(it.rot){
        ctx.translate(ix+isz/2,iy+isz/2);
        ctx.rotate(it.rot*Math.PI/180);
        ctx.translate(-(ix+isz/2),-(iy+isz/2));
      }
      
      if(it.type==='emoji'){
        // Emoji: offscreen fillText at 2x
        var off=document.createElement('canvas');
        off.width=isz*2;off.height=isz*2;
        var offCtx=off.getContext('2d');
        offCtx.font=(isz*1.6)+'px system-ui';
        offCtx.textAlign='center';offCtx.textBaseline='middle';
        offCtx.fillText(it.text,off.width/2,off.height/2);
        ctx.drawImage(off,ix,iy,isz,isz);
      }else{
        // Build image source
        var imgSrc='';
        if(it.type==='lucide'){
          var col=it.cc?it.col:'#ffffff';
          if(state.shape!=='folder')col=it.cc?it.col:'#333333';
          imgSrc=makeSvgDataUrl(ICONS[it.icon],col,isz);
        }else if(it.type==='custom'){
          imgSrc=it.customSrc;
        }else if(it.type==='text'){
          var col2=it.cc?it.col:'#ffffff';
          if(state.shape!=='folder')col2=it.cc?it.col:'#333333';
          imgSrc=makeTextSvgDataUrl(it.text||'Aa',it.fontFamily||'system-ui',col2,isz,isz);
        }
        
        var img=await loadImg(imgSrc);
        if(img){
          // Emboss layers (folder mode only, not text/emoji)
          if(isImageShape()&&it.emboss&&it.type!=='emoji'){
            await drawEmbossLayers(ctx,img,it,ix,iy,isz,sz);
          }else{
            ctx.drawImage(img,ix,iy,isz,isz);
          }
        }
      }
      
      ctx.restore();
    }
    
    // Download
    var dataUrl=canvas.toDataURL('image/png');
    var a=document.createElement('a');
    a.href=dataUrl;
    a.download='icon-'+sz+'px.png';
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){a.remove();},100);
    showBanner('Exported '+sz+'px');
  }catch(err){
    alert('Export error: '+err.message);
  }
}

async function drawEmbossLayers(ctx,img,item,ix,iy,isz,sz){
  var isText=item.type==='text';
  var off=sz*(isText?0.002:0.005);
  var tSz=Math.round(isz)||200;
  var embBase=item.cc?item.col:state.embossColor;
  var shOp=isText?0.5:0.6;
  var hlOp=isText?0.2:0.25;
  var fillOp=isText?0.55:0.45;
  // Shadow layer
  ctx.save();ctx.globalAlpha=(item.op/100)*shOp;
  var shadowCanvas=await tintImage(img,darkenColor(embBase,0.3),tSz);
  if(shadowCanvas)ctx.drawImage(shadowCanvas,ix-off,iy-off,isz,isz);
  ctx.restore();
  
  // Highlight layer
  ctx.save();ctx.globalAlpha=(item.op/100)*hlOp;
  var hlCanvas=await tintImage(img,'#ffffff',tSz);
  if(hlCanvas)ctx.drawImage(hlCanvas,ix+off*1.25,iy+off*1.25,isz,isz);
  ctx.restore();
  
  // Fill layer
  ctx.save();ctx.globalAlpha=(item.op/100)*fillOp;
  var fillCanvas=await tintImage(img,embBase,tSz);
  if(fillCanvas)ctx.drawImage(fillCanvas,ix,iy,isz,isz);
  ctx.restore();
}

async function tintImage(img,color,targetSz){
  try{
    var w=targetSz||img.naturalWidth||img.width||200;
    var h=targetSz||img.naturalHeight||img.height||200;
    if(w<1||h<1)return null;
    var c=document.createElement('canvas');
    c.width=w;c.height=h;
    var cx=c.getContext('2d');
    cx.drawImage(img,0,0,w,h);
    cx.globalCompositeOperation='source-in';
    cx.fillStyle=color;
    cx.fillRect(0,0,w,h);
    return c;
  }catch(e){return null;}
}

function darkenColor(hex,amount){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.round(r*amount);g=Math.round(g*amount);b=Math.round(b*amount);
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

async function doBatchExport(){
  var sizes=[128,256,512,1024];
  for(var i=0;i<sizes.length;i++){
    state.expSz=sizes[i];
    await doExport();
    await new Promise(function(r){setTimeout(r,300);});
  }
  state.expSz=512;
  renderExportRow();
  showBanner('Batch export complete');
}
